services:
  - type: web
    name: firewood-api
    env: node
    rootDir: server
    buildCommand: npm ci && npm run deploy:check
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 1d
      - key: CORS_ORIGIN
        sync: false
      - key: TRUST_PROXY
        value: "1"
      - key: RATE_LIMIT_WINDOW_MINUTES
        value: "15"
      - key: RATE_LIMIT_MAX
        value: "300"
      - key: SHUTDOWN_TIMEOUT_MS
        value: "10000"
