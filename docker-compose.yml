services:
  api:
    build:
      context: ./server
    env_file:
      - ./server/.env
    ports:
      - "5000:5000"
    restart: unless-stopped

  web:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5000/api
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped
